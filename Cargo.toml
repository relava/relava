[workspace]
members = [
    "crates/relava-core",
    "crates/relava-cli",
    "crates/relava-server",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Elastic-2.0"

[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
dirs = "6"
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
tokio = { version = "1", features = ["full"] }
axum = "0.8"
relava-core = { path = "crates/relava-core" }
