[package]
name = "relava"
version = "0.1.0"
edition = "2024"
description = "A local package manager for Claude Code prompt-layer artifacts"
license = "Elastic-2.0"

[dependencies]
clap = { version = "4", features = ["derive"] }
dirs = "6"
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
